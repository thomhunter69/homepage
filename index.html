<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Work Station</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1c2333;
    --surface: #242e42;
    --surface2: #2d3a52;
    --surface3: #354057;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f4ff;
    --text2: #9baac4;
    --text3: #5d6d88;
    --blue: #4d7eff;
    --blue-hover: #6690ff;
    --blue-dim: rgba(77,126,255,0.15);
    --radius: 11px;
    --card-size: 92px;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 44px;
    height: 54px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo {
    width: 28px; height: 28px; background: var(--blue);
    border-radius: 7px; display: flex; align-items: center; justify-content: center;
  }
  .logo svg { width: 14px; height: 14px; }
  .site-title { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .clock { font-size: 12px; color: var(--text3); letter-spacing: 0.02em; }
  .add-btn {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; font-family: inherit; font-weight: 500;
    color: #fff; background: var(--blue);
    border: none; border-radius: 7px;
    padding: 7px 13px; cursor: pointer; transition: background 0.15s;
  }
  .add-btn:hover { background: var(--blue-hover); }
  .add-btn svg { width: 12px; height: 12px; }

  /* ── Main ── */
  .main { padding: 36px 44px 64px; max-width: 1280px; margin: 0 auto; }

  /* ── Category ── */
  .category { margin-bottom: 32px; }
  .category-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .category-label {
    font-size: 11px; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text2); white-space: nowrap;
  }
  .category-line { flex: 1; height: 1px; background: var(--border); }
  .cat-remove-btn {
    font-size: 11px; color: var(--text3); background: none; border: none;
    cursor: pointer; font-family: inherit; padding: 2px 6px;
    border-radius: 4px; transition: color 0.12s;
  }
  .cat-remove-btn:hover { color: #e05252; }

  /* ── Grid ── */
  .grid { display: flex; flex-wrap: wrap; gap: 9px; }

  /* ── Tile ── */
  .tile {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    width: var(--card-size); min-height: var(--card-size);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 8px 10px;
    text-decoration: none; position: relative;
    transition: background 0.13s, border-color 0.13s;
    user-select: none;
  }
  .tile:hover { background: var(--surface2); border-color: var(--border2); }
  .tile:hover .tile-delete { opacity: 1; }

  .tile-icon {
    width: 38px; height: 38px; border-radius: 9px;
    background: var(--surface2); border: 1px solid var(--border);
    overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .tile-icon img { width: 22px; height: 22px; object-fit: contain; }
  .tile-icon.fallback {
    font-size: 13px; font-weight: 700;
    color: var(--blue); background: var(--blue-dim);
    border-color: transparent;
  }

  .tile-name {
    font-size: 10.5px; font-weight: 500; color: var(--text2);
    text-align: center; line-height: 1.3; max-width: 76px;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; word-break: break-word;
  }

  .tile-delete {
    position: absolute; top: -6px; right: -6px;
    width: 17px; height: 17px; border-radius: 50%;
    background: var(--surface3); border: 1px solid var(--border2);
    color: var(--text3); display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0; transition: opacity 0.12s, color 0.12s;
    font-size: 8px; line-height: 1;
  }
  .tile-delete:hover { color: #e05252; }

  /* ── Add tile ── */
  .tile-add {
    border-style: dashed; border-color: var(--border2);
    background: transparent; color: var(--text3); cursor: pointer;
  }
  .tile-add:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
  .tile-add svg { width: 18px; height: 18px; }
  .tile-add span { font-size: 10.5px; font-weight: 500; }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.15s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 14px; padding: 24px; width: 380px;
    transform: translateY(8px); transition: transform 0.15s;
  }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal h2 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 18px; }
  .modal label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--text3); display: block; margin-bottom: 5px; margin-top: 13px;
  }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 7px; color: var(--text); font-family: inherit; font-size: 13px;
    padding: 8px 11px; outline: none; transition: border-color 0.12s;
  }
  .modal input:focus, .modal select:focus { border-color: var(--blue); }
  .modal select option { background: var(--surface); }
  .add-cat-row { display: flex; align-items: center; gap: 7px; margin-top: 6px; }
  .add-cat-row input { flex: 1; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .btn { font-family: inherit; font-size: 13px; font-weight: 500; border-radius: 7px; padding: 8px 16px; cursor: pointer; transition: background 0.12s; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-primary { background: var(--blue); border: 1px solid var(--blue); color: #fff; }
  .btn-primary:hover { background: var(--blue-hover); }
  .btn-sm { font-size: 12px; padding: 6px 10px; }

  @media (max-width: 600px) {
    .main { padding: 20px 16px 40px; }
    .header { padding: 0 16px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">
      <svg viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1.5" y="1.5" width="4" height="4" rx="1"/>
        <rect x="8.5" y="1.5" width="4" height="4" rx="1"/>
        <rect x="1.5" y="8.5" width="4" height="4" rx="1"/>
        <rect x="8.5" y="8.5" width="4" height="4" rx="1"/>
      </svg>
    </div>
    <span class="site-title">My Work Station</span>
  </div>
  <div class="header-right">
    <span class="clock" id="clock"></span>
    <button class="add-btn" onclick="openAddModal()">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/>
      </svg>
      Add bookmark
    </button>
  </div>
</header>

<div class="main">
  <div id="categories-container"></div>
</div>

<div class="modal-backdrop" id="modal" onclick="closeModalIfBackdrop(event)">
  <div class="modal">
    <h2 id="modal-title">Add bookmark</h2>
    <label>Name</label>
    <input id="bm-name" type="text" placeholder="e.g. GitHub" />
    <label>URL</label>
    <input id="bm-url" type="url" placeholder="https://github.com" />
    <label>Category</label>
    <select id="bm-category"></select>
    <div class="add-cat-row">
      <input id="new-cat-input" type="text" placeholder="Or create a new category…" />
      <button class="btn btn-ghost btn-sm" onclick="addCategoryFromInput()">Add</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBookmark()">Save</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'bm_data_v3';
const DEFAULT_DATA = {
  categories: ['Work', 'Development Tools', 'AI Tools', 'Media'],
  bookmarks: [
    { id: 1, name: 'GitHub', url: 'https://github.com', category: 'Work' },
    { id: 2, name: 'Linear', url: 'https://linear.app', category: 'Work' },
    { id: 3, name: 'Notion', url: 'https://notion.so', category: 'Work' },
    { id: 4, name: 'Figma', url: 'https://figma.com', category: 'Development Tools' },
    { id: 5, name: 'Claude', url: 'https://claude.ai', category: 'AI Tools' },
    { id: 6, name: 'YouTube', url: 'https://youtube.com', category: 'Media' },
    { id: 7, name: 'Spotify', url: 'https://open.spotify.com', category: 'Media' },
    { id: 8, name: 'Hacker News', url: 'https://news.ycombinator.com', category: 'Media' },
  ]
};

let data = loadData();
let editingId = null;

function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0');
  const ampm = h >= 12 ? 'PM' : 'AM', h12 = h % 12 || 12;
  document.getElementById('clock').textContent =
    `${now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})} · ${h12}:${m} ${ampm}`;
}
updateClock(); setInterval(updateClock, 10000);

function faviconUrl(url) {
  try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`; }
  catch(e) { return null; }
}
function initials(name) {
  return name.split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

function render() {
  const container = document.getElementById('categories-container');
  container.innerHTML = '';
  data.categories.forEach(cat => {
    const bms = data.bookmarks.filter(b => b.category === cat);
    const sec = document.createElement('div');
    sec.className = 'category';

    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `
      <span class="category-label">${escHtml(cat)}</span>
      <div class="category-line"></div>
      <button class="cat-remove-btn" onclick="removeCategory('${escHtml(cat)}')">Remove</button>
    `;

    const grid = document.createElement('div');
    grid.className = 'grid';
    bms.forEach(bm => grid.appendChild(makeTile(bm)));

    const addTile = document.createElement('div');
    addTile.className = 'tile tile-add';
    addTile.title = 'Add to ' + cat;
    addTile.innerHTML = `<svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="9" y1="2" x2="9" y2="16"/><line x1="2" y1="9" x2="16" y2="9"/></svg><span>Add</span>`;
    addTile.onclick = () => openAddModal(cat);
    grid.appendChild(addTile);

    sec.appendChild(header);
    sec.appendChild(grid);
    container.appendChild(sec);
  });
}

function makeTile(bm) {
  const tile = document.createElement('a');
  tile.className = 'tile';
  tile.href = bm.url;
  tile.target = '_blank';
  tile.rel = 'noopener noreferrer';
  tile.title = bm.url;

  const iconDiv = document.createElement('div');
  iconDiv.className = 'tile-icon';
  const fav = faviconUrl(bm.url);
  if (fav) {
    const img = document.createElement('img');
    img.src = fav; img.alt = '';
    img.onerror = () => { iconDiv.innerHTML = ''; iconDiv.className = 'tile-icon fallback'; iconDiv.textContent = initials(bm.name); };
    iconDiv.appendChild(img);
  } else {
    iconDiv.className = 'tile-icon fallback';
    iconDiv.textContent = initials(bm.name);
  }

  const name = document.createElement('span');
  name.className = 'tile-name';
  name.textContent = bm.name;

  const del = document.createElement('button');
  del.className = 'tile-delete';
  del.innerHTML = '✕';
  del.title = 'Remove';
  del.onclick = e => { e.preventDefault(); e.stopPropagation(); removeBookmark(bm.id); };

  tile.appendChild(iconDiv);
  tile.appendChild(name);
  tile.appendChild(del);
  return tile;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openAddModal(presetCat) {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add bookmark';
  document.getElementById('bm-name').value = '';
  document.getElementById('bm-url').value = '';
  document.getElementById('new-cat-input').value = '';
  populateCatSelect(presetCat || data.categories[0]);
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('bm-name').focus(), 100);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeModalIfBackdrop(e) { if (e.target === document.getElementById('modal')) closeModal(); }

function populateCatSelect(selected) {
  const sel = document.getElementById('bm-category');
  sel.innerHTML = '';
  data.categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    if (c === selected) opt.selected = true;
    sel.appendChild(opt);
  });
}

function saveBookmark() {
  const name = document.getElementById('bm-name').value.trim();
  let url = document.getElementById('bm-url').value.trim();
  const cat = document.getElementById('bm-category').value;
  if (!name || !url) { alert('Please fill in name and URL.'); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  if (editingId) {
    const bm = data.bookmarks.find(b => b.id === editingId);
    if (bm) { bm.name = name; bm.url = url; bm.category = cat; }
  } else {
    data.bookmarks.push({ id: Date.now(), name, url, category: cat });
  }
  saveData(); render(); closeModal();
}

function removeBookmark(id) {
  data.bookmarks = data.bookmarks.filter(b => b.id !== id);
  saveData(); render();
}

function addCategoryFromInput() {
  const input = document.getElementById('new-cat-input');
  const val = input.value.trim();
  if (!val) return;
  if (!data.categories.includes(val)) { data.categories.push(val); saveData(); }
  populateCatSelect(val);
  input.value = '';
}

function removeCategory(cat) {
  if (!confirm(`Remove "${cat}" and all its bookmarks?`)) return;
  data.categories = data.categories.filter(c => c !== cat);
  data.bookmarks = data.bookmarks.filter(b => b.category !== cat);
  saveData(); render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal').classList.contains('open')) saveBookmark();
});

render();
</script>
</body>
</html>
